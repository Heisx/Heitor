<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pêssego Emoji Gelatinoso</title>
  <style>
    :root {
      --bg-1: #6e0f16;
      --bg-2: #a31621;
      --bg-3: #d62839;

      --text: rgba(255,255,255,0.96);
      --text-soft: rgba(255,255,255,0.72);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 16%),
        radial-gradient(circle at 80% 25%, rgba(255,255,255,0.04), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
      background-size: 140% 140%;
      animation: bgShift 12s ease-in-out infinite;
    }

    body {
      display: grid;
      place-items: center;
    }

    .scene {
      position: relative;
      width: min(100vw, 760px);
      height: min(100vh, 760px);
      display: grid;
      place-items: center;
      isolation: isolate;
      padding: 20px;
    }

    .back-rings {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .ring {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      filter: blur(0.4px);
      animation: spinSlow linear infinite;
    }

    .ring.r1 {
      width: 300px;
      height: 300px;
      animation-duration: 24s;
    }

    .ring.r2 {
      width: 390px;
      height: 390px;
      animation-duration: 34s;
      transform: rotate(25deg);
    }

    .ring.r3 {
      width: 480px;
      height: 480px;
      animation-duration: 42s;
      transform: rotate(-18deg);
    }

    .ground-shadow {
      position: absolute;
      bottom: 150px;
      width: 220px;
      height: 42px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,0,0,0.26), rgba(0,0,0,0.08) 56%, transparent 74%);
      filter: blur(12px);
      z-index: 1;
      animation: shadowBreath 2.2s ease-in-out infinite;
      pointer-events: none;
    }

    .peach-stage {
      position: relative;
      width: 100%;
      max-width: 420px;
      height: 470px;
      display: grid;
      place-items: center;
      z-index: 2;
      transform-style: preserve-3d;
    }

    .peach-rig {
      position: relative;
      width: 330px;
      height: 390px;
      transform-origin: 50% 18%;
      animation: sway 2.2s ease-in-out infinite;
      will-change: transform;
      cursor: pointer;
      touch-action: manipulation;
    }

    .peach-rig.is-hovered {
      animation-duration: 1.15s;
    }

    .jelly {
      position: absolute;
      inset: 0;
      transform-origin: 50% 58%;
      animation: jelly 2.2s ease-in-out infinite;
      will-change: transform;
    }

    .peach-svg-wrap {
      position: absolute;
      left: 50%;
      top: 26px;
      width: 320px;
      height: 320px;
      transform: translateX(-50%);
      filter: drop-shadow(0 18px 18px rgba(0,0,0,0.16));
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      display: block;
    }

    .stem {
      transform-origin: 160px 52px;
      animation: stemMove 2.2s ease-in-out infinite;
    }

    .leaf {
      transform-origin: 180px 48px;
      animation: leafMove 2.2s ease-in-out infinite;
    }

    .float {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.22), rgba(255,255,255,0.04));
      filter: blur(0.5px);
      opacity: 0;
      animation: floatUp linear forwards;
    }

    .badge {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 5;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .hint {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.66);
      font-size: 11px;
      letter-spacing: 0.06em;
      z-index: 5;
    }

    .message-wrap {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 560px);
      z-index: 4;
      padding: 0 12px;
    }

    .message {
      margin: 0;
      color: var(--text);
      text-align: center;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.18);
      line-height: 1.2;
      animation: textFade .45s ease;
    }

    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes sway {
      0%   { transform: rotate(-6deg) translateY(0); }
      25%  { transform: rotate(-2deg) translateY(-3px); }
      50%  { transform: rotate(6deg) translateY(0); }
      75%  { transform: rotate(2deg) translateY(-2px); }
      100% { transform: rotate(-6deg) translateY(0); }
    }

    @keyframes jelly {
      0%   { transform: scaleX(1) scaleY(1); }
      10%  { transform: scaleX(1.06) scaleY(0.93); }
      22%  { transform: scaleX(0.96) scaleY(1.04); }
      36%  { transform: scaleX(1.03) scaleY(0.98); }
      52%  { transform: scaleX(0.985) scaleY(1.018); }
      68%  { transform: scaleX(1.015) scaleY(0.992); }
      84%  { transform: scaleX(0.997) scaleY(1.004); }
      100% { transform: scaleX(1) scaleY(1); }
    }

    @keyframes leafMove {
      0%, 100% { transform: rotate(-14deg); }
      50% { transform: rotate(-7deg); }
    }

    @keyframes stemMove {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(-6deg); }
    }

    @keyframes shadowBreath {
      0%, 100% { transform: scaleX(1) translateX(-8px); opacity: .84; }
      50% { transform: scaleX(1.08) translateX(8px); opacity: .64; }
    }

    @keyframes textFade {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.7);
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-150px) scale(1.2);
      }
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 700px) {
      .scene {
        width: 100vw;
        height: 100vh;
        padding: 12px;
      }

      .peach-stage {
        max-width: 100%;
        height: 390px;
      }

      .peach-rig {
        width: 280px;
        height: 330px;
      }

      .peach-svg-wrap {
        width: 270px;
        height: 270px;
        top: 24px;
      }

      .ground-shadow {
        width: 180px;
        height: 34px;
        bottom: 115px;
      }

      .message-wrap {
        bottom: 22px;
      }

      .badge {
        top: 14px;
        font-size: 10px;
        padding: 8px 12px;
      }

      .hint {
        top: 48px;
        font-size: 10px;
      }

      .ring.r1 {
        width: 220px;
        height: 220px;
      }

      .ring.r2 {
        width: 300px;
        height: 300px;
      }

      .ring.r3 {
        width: 380px;
        height: 380px;
      }
    }

    @media (max-width: 420px) {
      .peach-stage {
        height: 350px;
      }

      .peach-rig {
        width: 250px;
        height: 300px;
      }

      .peach-svg-wrap {
        width: 235px;
        height: 235px;
        top: 28px;
      }

      .ground-shadow {
        bottom: 96px;
        width: 155px;
      }

      .message {
        font-size: clamp(18px, 6vw, 24px);
      }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="back-rings">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
    </div>

    <div class="badge">CLICA PARA A SIMULAÇÃO DE UM BUMBUM</div>
    <div class="hint">clique ou passe o mouse</div>

    <div class="ground-shadow"></div>

    <div class="peach-stage">
      <div class="peach-rig" id="peachRig">
        <div class="jelly" id="jelly">
          <div class="peach-svg-wrap">
            <svg viewBox="0 0 320 320" aria-label="Pêssego estilizado">
              <defs>
                <linearGradient id="peachBodyLeft" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#ffdcca"/>
                  <stop offset="24%" stop-color="#ffc7a3"/>
                  <stop offset="56%" stop-color="#ff9b73"/>
                  <stop offset="82%" stop-color="#f27668"/>
                  <stop offset="100%" stop-color="#d9585b"/>
                </linearGradient>

                <linearGradient id="peachBodyRight" x1="100%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#ffdcca"/>
                  <stop offset="24%" stop-color="#ffc7a3"/>
                  <stop offset="56%" stop-color="#ff9b73"/>
                  <stop offset="82%" stop-color="#f27668"/>
                  <stop offset="100%" stop-color="#d9585b"/>
                </linearGradient>

                <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#7cd676"/>
                  <stop offset="100%" stop-color="#2f7e47"/>
                </linearGradient>

                <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#8c623f"/>
                  <stop offset="100%" stop-color="#4f341f"/>
                </linearGradient>

                <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="5"/>
                </filter>
              </defs>

              <g class="leaf">
                <path
                  d="M182 38
                     C206 24, 232 30, 244 46
                     C227 58, 202 58, 182 38 Z"
                  fill="url(#leafGrad)"
                />
                <path
                  d="M190 40 C205 42, 220 44, 234 46"
                  stroke="rgba(255,255,255,0.18)"
                  stroke-width="2"
                  fill="none"
                  stroke-linecap="round"
                />
              </g>

              <g class="stem">
                <path
                  d="M160 53
                     C158 40, 166 30, 176 24
                     C174 35, 170 46, 168 58 Z"
                  fill="url(#stemGrad)"
                />
              </g>

              <ellipse cx="160" cy="72" rx="34" ry="14" fill="rgba(93,27,24,0.12)" filter="url(#softBlur)"/>

              <path
                d="M152 74
                   C116 62, 82 76, 58 110
                   C36 141, 34 196, 60 233
                   C82 266, 114 281, 147 274
                   C163 270, 172 258, 177 242
                   C184 219, 182 181, 174 145
                   C169 120, 164 94, 152 74 Z"
                fill="url(#peachBodyLeft)"
              />

              <path
                d="M168 74
                   C204 62, 238 76, 262 110
                   C284 141, 286 196, 260 233
                   C238 266, 206 281, 173 274
                   C157 270, 148 258, 143 242
                   C136 219, 138 181, 146 145
                   C151 120, 156 94, 168 74 Z"
                fill="url(#peachBodyRight)"
              />

              <ellipse cx="115" cy="240" rx="36" ry="22" fill="rgba(201,65,79,0.12)" filter="url(#softBlur)"/>
              <ellipse cx="205" cy="240" rx="36" ry="22" fill="rgba(201,65,79,0.12)" filter="url(#softBlur)"/>

              <ellipse cx="160" cy="168" rx="34" ry="86" fill="rgba(76,24,22,0.10)" filter="url(#softBlur)"/>

              <path
                d="M178 82
                   C150 118, 148 176, 174 250"
                stroke="rgba(101,34,31,0.88)"
                stroke-width="7"
                fill="none"
                stroke-linecap="round"
              />
            </svg>
          </div>
        </div>
      </div>

      <div class="float" id="floatLayer"></div>
    </div>

    <div class="message-wrap">
      <p class="message">ME DA A BUNDA?
        PLEASE
      </p>
    </div>
  </div>

  <script>
    const peachRig = document.getElementById("peachRig");
    const jelly = document.getElementById("jelly");
    const floatLayer = document.getElementById("floatLayer");

    function createSpark() {
      if (window.innerWidth < 500 && floatLayer.children.length > 8) return;
      if (window.innerWidth >= 500 && floatLayer.children.length > 14) return;

      const s = document.createElement("span");
      s.className = "spark";

      const size = 3 + Math.random() * 5;
      const duration = 2600 + Math.random() * 2200;
      const x = 30 + Math.random() * Math.max(120, floatLayer.clientWidth - 60);
      const y = floatLayer.clientHeight - (70 + Math.random() * 50);

      s.style.width = `${size}px`;
      s.style.height = `${size}px`;
      s.style.left = `${x}px`;
      s.style.top = `${y}px`;
      s.style.animationDuration = `${duration}ms`;

      floatLayer.appendChild(s);
      setTimeout(() => s.remove(), duration);
    }

    setInterval(createSpark, 260);

    function impulse() {
      peachRig.animate(
        [
          { transform: "rotate(-2deg) translateY(0)" },
          { transform: "rotate(8deg) translateY(-2px)" },
          { transform: "rotate(-5deg) translateY(0)" },
          { transform: "rotate(3deg) translateY(-1px)" },
          { transform: "rotate(0deg) translateY(0)" }
        ],
        {
          duration: 760,
          easing: "cubic-bezier(.2,.85,.2,1)"
        }
      );

      jelly.animate(
        [
          { transform: "scaleX(1) scaleY(1)" },
          { transform: "scaleX(1.10) scaleY(.90)" },
          { transform: "scaleX(.94) scaleY(1.06)" },
          { transform: "scaleX(1.03) scaleY(.98)" },
          { transform: "scaleX(.99) scaleY(1.01)" },
          { transform: "scaleX(1) scaleY(1)" }
        ],
        {
          duration: 760,
          easing: "cubic-bezier(.2,.85,.2,1)"
        }
      );
    }

    setInterval(impulse, 3600);

    peachRig.addEventListener("mouseenter", () => {
      peachRig.classList.add("is-hovered");
    });

    peachRig.addEventListener("mouseleave", () => {
      peachRig.classList.remove("is-hovered");
      peachRig.style.transform = "";
    });

    peachRig.addEventListener("click", () => {
      impulse();
    });

    peachRig.addEventListener("touchstart", () => {
      impulse();
    }, { passive: true });

    if (window.innerWidth > 700) {
      window.addEventListener("mousemove", (e) => {
        const rect = peachRig.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        const dx = (e.clientX - cx) / 180;
        const dy = (e.clientY - cy) / 220;

        peachRig.style.transform = `rotate(${Math.max(-8, Math.min(8, dx * 8))}deg) translateY(${Math.max(-4, Math.min(4, dy * -3))}px)`;
      });

      window.addEventListener("mouseleave", () => {
        peachRig.style.transform = "";
      });
    }
  </script>
</body>
</html>
